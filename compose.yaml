name: knowledge

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - edge
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - edge
      - internal
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    init: true
    restart: unless-stopped

networks:
  edge:
  internal:
    internal: true