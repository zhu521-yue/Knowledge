name: knowledge

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - edge
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - edge
      - internal
    environment:
      KNOWLEDGE_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-knowledge}:${MYSQL_PASSWORD:-knowledge_dev_password}@mysql:3306/${MYSQL_DATABASE:-knowledge}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    init: true
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-knowledge}
      MYSQL_USER: ${MYSQL_USER:-knowledge}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-knowledge_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_password}
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} --password=$${MYSQL_PASSWORD} --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

networks:
  edge:
  internal:
    internal: true